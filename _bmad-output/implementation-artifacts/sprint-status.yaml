          3-3-save-source-configuration: backlog
        retrospective: optional

  # ─────────────────────────────────────────────────────────────────────
  # SPRINT 4: Splunk-compatible OTLP export foundation
  # ─────────────────────────────────────────────────────────────────────
  sprint-4:
    status: planned
    goal: "Sam and Ravi can rely on a secure OTLP export foundation with correct telemetry contract and deterministic failure handling"
    deliverable: >
      A reusable OTLP export foundation exists with module-level exporter
      initialization, TLS support (including custom PEM secrets), Splunk-ready
      Event Table contract mapping, and deterministic retry or terminal failure
      handling. Sprint 5 collectors consume this foundation directly.
    acceptance_test: >
      Integration test: initialize exporter with test endpoint → send a batch
      of span data → verify arrival in Splunk with correct db.*/snowflake.*
      attributes → simulate transient error → verify retry succeeds → simulate
      permanent error → verify terminal failure recorded in _metrics.pipeline_health.
    depends_on: [sprint-1]
    note: >
      Foundation sprint for secure OTLP delivery and telemetry contract
      correctness. Primarily integration-tested, but explicitly tied to user
      outcomes for Sam and Ravi.
    epic:
      epic-4:
        name: "Splunk-compatible OTLP export foundation"
        tags: [Backend, Integration, Contract]
        status: backlog
        stories:
          4-1-secure-otlp-export-foundation: backlog
          4-2-splunk-compatible-telemetry-contract: backlog
          4-3-deterministic-otlp-retry-and-terminal-failure-handling: backlog
        retrospective: optional

  # ─────────────────────────────────────────────────────────────────────
  # SPRINT 5: Incremental telemetry collection pipelines
  # ─────────────────────────────────────────────────────────────────────
  sprint-5:
    status: planned
    goal: "Sam can rely on Event Table and ACCOUNT_USAGE collection pipelines that incrementally prepare and export telemetry"
    deliverable: >
      Two collection pipelines are implemented. The Event Table collector reads
      from a stream, applies entity discrimination, batches via
      to_pandas_batches(), exports via the Sprint 4 OTLP foundation, and
      records health. The ACCOUNT_USAGE collector reads with watermark +
      overlap, deduplicates, exports via the OTLP foundation, and updates
      watermark independently per source.
    acceptance_test: >
      Integration test: create test stream with sample ET data → run ET collector →
      verify entity filter applied → verify batch exported → verify stream advanced →
      verify health metrics in _metrics.pipeline_health.
      Integration test: seed AU source with test rows → run AU collector →
      verify watermark/overlap/dedup → verify OTLP export → verify watermark updated.
    depends_on: [sprint-4]
    note: >
      Pipeline foundation sprint. These procedures are directly testable through
      integration harnesses before Sprint 6 provisions the Snowflake tasks that
      invoke them automatically.
    epic:
      epic-5:
        name: "Incremental telemetry collection pipelines"
        tags: [Backend, Data Pipeline]
        status: backlog
        stories:
          5-1-incremental-event-table-collection-and-export: backlog
          5-2-incremental-account-usage-collection-and-export: backlog
        retrospective: optional

