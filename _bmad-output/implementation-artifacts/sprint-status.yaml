    depends_on: [sprint-2, sprint-3, sprint-5]
    milestone: MVP
    note: >
      This is the integration point where all prior work converges. After this
      sprint, the complete first-time setup flow works end-to-end and telemetry
      is flowing from Snowflake to Splunk.
    epic:
      epic-4:
        name: "Data governance review and activation"
        tags: [Full-stack, Integration]
        status: backlog
        stories:
