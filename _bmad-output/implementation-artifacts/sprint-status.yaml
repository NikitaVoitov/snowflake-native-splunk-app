  # ─────────────────────────────────────────────────────────────────────
  sprint-3:
    status: active
    goal: "Maya can discover sources, enable packs, select sources, configure intervals, and save"
    deliverable: >
      Maya opens the Telemetry Sources page, sees discovered Event Tables and
