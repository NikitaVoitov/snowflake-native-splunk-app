    acceptance_test: >
      Open Splunk Settings → enter OTLP endpoint → click Test Connection →
      see pass result → (optional) paste PEM → Validate Certificate → see pass →
      Save Settings → navigate to Getting Started → see task 1 completed (1/4) →
      verify config persisted in _internal.config → restart app → config still there.
    depends_on: [sprint-1]
    epic:
      epic-2:
        name: "First-time setup and destination configuration"
        tags: [UI, Config]
        status: done
        stories:
          2-1-otlp-endpoint-and-connection-test: done
          2-2-optional-certificate-and-validation: done
          2-3-persist-destination-config-and-getting-started-hub: done
        retrospective: done

  # ─────────────────────────────────────────────────────────────────────
