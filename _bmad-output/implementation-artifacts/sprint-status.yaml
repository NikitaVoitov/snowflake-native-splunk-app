          3-3-save-source-configuration: backlog
        retrospective: optional

  # ─────────────────────────────────────────────────────────────────────
  # SPRINT 4: OTLP export pipeline
  # ─────────────────────────────────────────────────────────────────────
  sprint-4:
    status: planned
    goal: "OTLP gRPC module can send spans, logs, and metrics to Splunk with retry and failure handling"
    deliverable: >
      A reusable OTLP gRPC export module with module-level exporter init,
      TLS support (including custom PEM), span/log mapping with Splunk-ready
      OTel conventions, and automatic retry for transient failures with
      terminal failure recording. Collectors (Sprint 5) will import this module.
    acceptance_test: >
      Integration test: initialize exporter with test endpoint → send a batch
      of span data → verify arrival in Splunk with correct db.*/snowflake.*
      attributes → simulate transient error → verify retry succeeds → simulate
      permanent error → verify terminal failure recorded in _metrics.pipeline_health.
    depends_on: [sprint-1]
    note: >
      Backend infrastructure sprint — not user-visible in the UI, but fully
      testable via integration tests. Required before collectors (Sprint 5) and
      activation (Sprint 6) can produce end-to-end results.
    epic:
      epic-6:
        name: "OTLP export and Splunk-ready telemetry"
        tags: [Backend]
        status: backlog
        stories:
          6-1-otlp-grpc-exporter-module: backlog
          6-2-event-table-span-and-log-mapping: backlog
          6-3-retry-and-terminal-failure-handling: backlog
        retrospective: optional

  # ─────────────────────────────────────────────────────────────────────
  # SPRINT 5: Collection handlers process telemetry
  # ─────────────────────────────────────────────────────────────────────
  sprint-5:
    status: planned
    goal: "ET and AU collector procedures read data, filter, map, export via OTLP module, and record health"
    deliverable: >
      Two Python stored-procedure handlers: the Event Table collector reads
      from a stream, applies entity discrimination, batches via to_pandas_batches(),
      exports via the OTLP module (Sprint 4), and records health. The
      ACCOUNT_USAGE collector reads with watermark + overlap, deduplicates,
      maps to OTLP log/event format, and updates watermark.
    acceptance_test: >
      Integration test: create test stream with sample ET data → run ET collector →
      verify entity filter applied → verify batch exported → verify stream advanced →
      verify health metrics in _metrics.pipeline_health.
      Integration test: seed AU source with test rows → run AU collector →
      verify watermark/overlap/dedup → verify OTLP export → verify watermark updated.
    depends_on: [sprint-4]
    note: >
      Backend infrastructure sprint — not user-visible in the UI, but fully
      testable via integration tests against a dev Snowflake schema.
      Story 4.3 (Sprint 6) will create the tasks that invoke these handlers.
    epic:
      epic-5:
        name: "Collection pipeline handlers"
        tags: [Backend]
        status: backlog
        stories:
          5-1-event-table-collector-procedure: backlog
          5-2-account-usage-collector-procedure: backlog
        retrospective: optional

