      tables exist. Pages render empty states.
    acceptance_test: >
      Install app → approve privileges → open Streamlit UI → navigate all
      sidebar pages → verify app_public, _internal, _staging, _metrics schemas
      exist → verify config and state tables created → reinstall confirms
      idempotent DDL.
    epic:
      epic-1:
        name: "App foundation and installation"
        tags: [Infrastructure, Full-stack]
        status: done
        stories:
          1-1-native-app-manifest-and-idempotent-setup: done
          1-2-config-and-state-tables: done
          1-3-streamlit-shell-and-navigation: done
