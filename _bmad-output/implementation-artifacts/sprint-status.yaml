# STATUS DEFINITIONS:
# ==================
# Sprint Status:
#   - planned: Sprint is planned but not started
#   - active: Sprint is currently in progress
#   - done: All stories in sprint completed
#
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created in stories folder
#   - in-progress: Developer actively working on implementation
#   - review: Ready for code review
#   - done: Story completed
#
# Retrospective Status:
#   - optional: Can be completed but not required
#   - done: Retrospective has been completed

# WORKFLOW NOTES:
# ===============
# - Epic transitions to 'in-progress' when first story is created (via create-story)
# - Stories should be worked sequentially within a sprint (top to bottom)
# - Dev moves story to 'review', then runs code-review (fresh context, different LLM recommended)
# - Each sprint delivers a testable, measurable increment of user value
#
# DEPENDENCY CHAIN (critical path):
# =================================
#   Epic 4 (OTLP export foundation) → Epic 5 (collectors use OTLP foundation)
#   → Epic 6 (activation provisions tasks and turns on end-to-end flow) → Epic 7
#   (health needs running pipelines)
#
#   Epics 2 + 3 (UI config) remain independent from Epics 4 + 5 (backend
#   foundations) until Epic 6, where setup, governance, and active pipelines
#   converge into the MVP integration point.
#
#   Implementation order: 1 → 2 → 3 → 4 → 5 → 6 → 7 → 8
#   This preserves the intended sprint flow while aligning epic numbering with
#   the actual dependency order and removing forward-dependency workarounds.

