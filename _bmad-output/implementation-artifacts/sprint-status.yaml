  # ─────────────────────────────────────────────────────────────────────
  # SPRINT 2: Splunk destination is configurable
  # ─────────────────────────────────────────────────────────────────────
  sprint-2:
    status: done
    goal: "Maya can configure OTLP destination, test connection, and see Getting Started progress"
    deliverable: >
      Maya enters an OTLP endpoint, runs a connection test (pass/fail),
