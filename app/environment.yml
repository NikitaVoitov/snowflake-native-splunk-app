# ─────────────────────────────────────────────────────────────────
# environment.yml — Snowflake Anaconda Channel runtime dependencies
# All packages must be available on the Snowflake Anaconda Channel.
# This file is used by the Streamlit runtime, which stays on Python 3.11.
# Stored procedures target Python 3.13 in app/setup.sql and should use the
# latest package versions available for the 3.13 runtime there.
# Verified against SNOWFLAKE.INFORMATION_SCHEMA.PACKAGES on 2026-04-03.
# ─────────────────────────────────────────────────────────────────

name: sf_env
channels:
  - snowflake
dependencies:
  # Core Application Framework
  - streamlit=1.52.2
  # Streamlit on 3.11 currently exposes snowflake-snowpark-python 1.9.0.
  # Stored procedures use Python 3.13 and currently resolve 1.48.0 there.
  - snowflake-snowpark-python=1.9.0
  - snowflake-native-apps-permission=0.1.9

  # Visualization & Dashboard
  - plotly=6.5.0

  # Telemetry Export (OTLP/gRPC)
  - opentelemetry-sdk=1.38.0
  - opentelemetry-exporter-otlp-proto-grpc=1.38.0
  - grpcio=1.78.0
  - protobuf=6.33.5

  # Input Validation
  - validators=0.35.0
  - dnspython=2.8.0

  # Data Serialization
  - orjson=3.9.15
