manifest_version: 2

version:
  name: V1_0
  label: "Splunk Observability for Snowflake - MVP"
  comment: "Initial release: Event Table telemetry and ACCOUNT_USAGE metrics export to Splunk via OTLP gRPC"

artifacts:
  setup_script: setup.sql
  readme: README.md
  default_streamlit: app_public.main
  extension_code: true

configuration:
  log_level: INFO
  trace_level: ALWAYS
  metric_level: ALL

privileges:
  - "IMPORTED PRIVILEGES ON SNOWFLAKE DB":
      description: "Required to read ACCOUNT_USAGE views for cost, performance, and security monitoring"
  - "EXECUTE TASK":
      description: "Required for the app task owner role to run scheduled and triggered tasks"
  - "EXECUTE MANAGED TASK":
      description: "Required to provision serverless compute for tasks"
  - "CREATE EXTERNAL ACCESS INTEGRATION":
      description: "Required to create an external access integration for OTLP gRPC egress"

references:
  - CONSUMER_EVENT_TABLE:
      label: "Event Table"
      description: "Consumer Event Table used to read telemetry data"
      privileges:
        - SELECT
      object_type: TABLE
      multi_valued: false
      register_callback: app_public.register_single_callback

  - SPLUNK_OTLP_SECRET:
      label: "Splunk OTLP Token Secret"
      description: "Snowflake Secret storing the Splunk Observability access token for OTLP gRPC export"
      privileges:
        - USAGE
      object_type: SECRET
      register_callback: app_public.register_single_callback
      configuration_callback: app_public.get_secret_configuration
      required_at_setup: false

  - SPLUNK_EAI:
      label: "Splunk External Access Integration"
      description: "EAI that allows OTLP gRPC egress from the app to Splunk"
      privileges:
        - USAGE
      object_type: EXTERNAL_ACCESS_INTEGRATION
      register_callback: app_public.register_single_callback
      configuration_callback: app_public.get_eai_configuration
      required_at_setup: false
