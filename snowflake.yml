# ─────────────────────────────────────────────────────────────────
# snowflake.yml — Snowflake CLI project definition
# Must be at the project root. All paths are relative to this file.
#
# This file defines the DEV package and app for local iterative development.
# For the full multi-package strategy (dev → scan → test → prod), see the
# vision doc: "Multi-Package Strategy for Development, Testing & Publishing".
# ─────────────────────────────────────────────────────────────────

definition_version: 2

entities:
  # --- Application Package (dev — per-developer iterative development) ---
  # Uses DISTRIBUTION=INTERNAL (default) — no security scan overhead.
  splunk_observability_dev_pkg:
    type: application package
    identifier: splunk_observability_dev_pkg
    stage: stage_content.app_stage
    manifest: app/manifest.yml
    artifacts:
      - src: app/manifest.yml
        dest: manifest.yml
      - src: app/setup.sql
        dest: setup.sql
      - src: app/README.md
        dest: README.md
      - src: app/environment.yml
        dest: environment.yml
      - src: app/environment.yml
        dest: streamlit/environment.yml
      - src: app/streamlit/main.py
        dest: streamlit/main.py
      - src: app/streamlit/pages/*.py
        dest: streamlit/pages/
      - src: app/streamlit/utils/__init__.py
        dest: streamlit/utils/__init__.py
      - src: app/streamlit/utils/snowflake.py
        dest: streamlit/utils/snowflake.py
      - src: app/streamlit/utils/config.py
        dest: streamlit/utils/config.py
      - src: app/streamlit/utils/onboarding.py
        dest: streamlit/utils/onboarding.py
      - src: app/python/endpoint_parse.py
        dest: python/endpoint_parse.py
      - src: app/python/provision_egress.py
        dest: python/provision_egress.py
      - src: app/python/connection_test.py
        dest: python/connection_test.py
      - src: app/python/cert_validate.py
        dest: python/cert_validate.py
      - src: app/python/secret_reader.py
        dest: python/secret_reader.py
    meta:
      post_deploy:
        - sql_script: scripts/shared_content.sql

  # --- Application Object (dev — installs from dev package for local testing) ---
  splunk_observability_dev_app:
    type: application
    from:
      target: splunk_observability_dev_pkg
    debug: false  # manifest_version: 2+ requires session debug mode instead
